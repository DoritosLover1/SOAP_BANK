spring:
  application:
    name: api-gateway

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info

account:
  service:
    wsdl-url: http://localhost:8081/ws/accounts.wsdl
    endpoint-url: http://localhost:8081/ws/accounts

transaction:
  service:
    wsdl-url: http://localhost:8084/ws/transactions?wsdl
    endpoint-url: http://localhost:8084/ws/transactions