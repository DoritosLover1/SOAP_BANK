apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: soap-bank
type: Opaque
stringData:
  POSTGRES_DB: bankadb
  POSTGRES_USER: banka
  POSTGRES_PASSWORD: banka123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: soap-bank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "banka", "-d", "bankadb"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        # Minikube'de basitlik için emptyDir kullanıyoruz — pod silinirse veri de gider.
        # Kalıcı veri istersen PersistentVolumeClaim'e çevirebiliriz.
        - name: postgres-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: soap-bank
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
