apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: soap-bank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
      annotations:
        # Prometheus'un pod'u otomatik keşfetmesi için (prometheus-operator kullanmıyorsan)
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: account-service
          image: soap-bank/account-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            # Cluster içinde Redis artık localhost değil, servis adı üzerinden erişilir
            - name: SPRING_DATA_REDIS_HOST
              value: "redis"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            # account-service'in kendi Postgres bağlantısı (localhost:5433 yerine)
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/bankadb"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: soap-bank
spec:
  selector:
    app: account-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
