apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: soap-bank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: soap-bank/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: ACCOUNT_SERVICE_WSDL_URL
              value: "http://account-service:8081/ws/accounts.wsdl"
            - name: ACCOUNT_SERVICE_ENDPOINT_URL
              value: "http://account-service:8081/ws/accounts"
            - name: TRANSACTION_SERVICE_WSDL_URL
              value: "http://transaction-service:8084/ws/transactions?wsdl"
            - name: TRANSACTION_SERVICE_ENDPOINT_URL
              value: "http://transaction-service:8084/ws/transactions"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: soap-bank
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8083
      targetPort: 8083
